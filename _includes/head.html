{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- VSCode proxy fix: use document.write for synchronous <base href> injection.
     Must run BEFORE any <link> tags so relative CSS paths resolve correctly.
     document.write is synchronous during initial parse — guaranteed ordering. -->
<script>
(function(){
  var path = window.location.pathname;
  var proxyMatch = path.match(/^(.*\/proxy\/\d+\/)/);
  if (proxyMatch) {
    document.write('<base href="' + window.location.origin + proxyMatch[1] + '">');
  }
})();
</script>

<!-- For all browsers — relative paths so they work with <base href> -->
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/academicons.css"/>

<!-- Open external links in new tab + fix absolute paths in proxy mode -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Fix absolute-path resources in proxy mode (they bypass <base href>)
    var path = window.location.pathname;
    var proxyMatch = path.match(/^(.*\/proxy\/\d+\/)/);
    if (proxyMatch) {
      var proxyPrefix = proxyMatch[1];
      // Fix <img src="/..."> and <script src="/...">
      document.querySelectorAll('img[src^="/"], script[src^="/"]').forEach(function(el) {
        var attr = el.hasAttribute('src') ? 'src' : 'src';
        el.setAttribute(attr, proxyPrefix + el.getAttribute(attr).substring(1));
      });
      // Fix <a href="/..."> (internal links only, not external)
      document.querySelectorAll('a[href^="/"]').forEach(function(el) {
        var href = el.getAttribute('href');
        if (href && !href.startsWith('//')) {
          el.setAttribute('href', proxyPrefix + href.substring(1));
        }
      });
      // Fix <link href="/...">
      document.querySelectorAll('link[href^="/"]').forEach(function(el) {
        var href = el.getAttribute('href');
        if (href && !href.startsWith('//')) {
          el.setAttribute('href', proxyPrefix + href.substring(1));
        }
      });
    }

    // Open external links in new tab
    document.querySelectorAll('a[href]').forEach(function(a) {
      var href = a.getAttribute('href');
      if (href && (href.indexOf('://') > -1 || href.indexOf('//') === 0)) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      }
    });
  });
</script>
